<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>THE QUIET PHONE — GALLERY</title>
    <style>
        :root { --accent: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0e0e0e;
            color: var(--accent);
            font-family: 'Consolas', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 12px 12px;
        }

        header {
            width: 100%;
            max-width: 1400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 4px;
            border-bottom: 1px solid color-mix(in srgb, var(--accent) 15%, transparent);
            padding-bottom: 8px;
        }

        h1 {
            font-size: 18px;
            font-weight: normal;
            letter-spacing: 4px;
            opacity: 0.95;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-left: auto;
        }

        #wallet-status {
            font-size: 11px;
            letter-spacing: 1.5px;
            opacity: 0.45;
        }

        .header-link {
            font-size: 11px;
            letter-spacing: 1.5px;
            color: var(--accent);
            opacity: 0.45;
            text-decoration: none;
            border-bottom: 1px dotted var(--accent);
            transition: opacity 0.2s ease;
        }

        .header-link:hover { opacity: 0.75; }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.7rem;
            opacity: 0.6;
            letter-spacing: 1px;
        }

        .footer-link {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px dotted var(--accent);
        }

        .main {
            display: flex;
            gap: 24px;
            width: 100%;
            max-width: 1400px;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
        }

        #portrait {
            position: sticky;
            top: 20px;
            width: 400px;
            height: 600px;
            background: #141414;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #portrait svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        #portrait-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 13px;
            letter-spacing: 4px;
            color: var(--accent);
            opacity: 0.4;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.6; }
        }

        .gallery-item {
            animation: fadeIn 0.4s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .list {
            width: 500px;
            display: flex;
            flex-direction: column;
            gap: 0;
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 8px;
        }

        .list::-webkit-scrollbar {
            width: 4px;
        }

        .list::-webkit-scrollbar-track {
            background: transparent;
        }

        .list::-webkit-scrollbar-thumb {
            background: var(--accent);
            opacity: 0.3;
            border-radius: 2px;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
        }

        .label {
            font-size: 10px;
            letter-spacing: 1.5px;
            opacity: 0.55;
        }

        #load-more-btn {
            background: none;
            border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
            color: var(--accent);
            padding: 8px 16px;
            cursor: pointer;
            font-family: inherit;
            font-size: 10px;
            letter-spacing: 2px;
            margin-top: 8px;
            width: 100%;
            transition: all 0.2s ease;
        }

        #load-more-btn:hover {
            background: var(--accent);
            color: #0e0e0e;
        }

        .viewing-label {
            font-size: 10px;
            letter-spacing: 1.5px;
            opacity: 0.5;
            margin-bottom: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>RESONANCE GALLERY</h1>
        <div class="header-right">
            <span id="wallet-status">THE QUIET PHONE</span>
            <a href="index.html" class="header-link" target="_blank">← BACK TO ETCH</a>
        </div>
    </header>

    <div class="main">
        <div id="portrait">
            <div id="portrait-loading">SELECT RESONANCE</div>
        </div>

        <div class="list" id="trait-list">
            <div class="label" style="opacity: 0.5">LOADING GALLERY...</div>
        </div>
    </div>

<footer>
    <a href="invitation.html" target="_blank" class="footer-link">INVITATION</a>
    &nbsp;//&nbsp;
    <a href="https://thelattice.ar.io" target="_blank" class="footer-link">THELATTICE</a>
</footer>

<script>
let galleryCursor = null;
let galleryHasMore = false;
let currentVariant = "7678";
let currentCountry = "ke";
let colors = {};

const arweaveUrls = [
  "mkoyhmg53byw5w2fdhxt43klvzm3juucjxdms3znmljlhdfwdh2a.ardrive.net/Yp2DsN3YcW7bRRnvPm1Lrlm00oJNxslvLWLSs4y2GfQ?",
  "i5x3e5hiwj7i7juc5c3bzgv7u6ahgbj22fegflrjzi5hxsyiovsq.ardrive.net/R2-ydOiyfo-mgui2HJq_p4BzBTrRSGKuKco6e8sIdWU?",
  "tjhbpgd6maigohmaobnujlyjn7lxgbd5echzoqinrjiaxesmmgka.ardrive.net/mk4XmH5gEGcdgHBbRK8Jb9dzBH0gj5dBDYpQC5JMYZQ?",
  "4vqnvnszqbr7xtkjdbybfu4zohdfolnfombn4wlrckoypmqabjpa.ardrive.net/5WDatlmAY_vNSRhwEtOZccZXLaVzAt5ZcRKdh7IACl4?",
  "ttjxb46zw6gv52smii7hl74b7fc7odyousgenaj6yxmsfxuqhsaq.ardrive.net/nNNw89m3jV7qTEI-df-B-UX3Dw6kjEaBPsXZIt6QPIE?"
];

const variants = { "5182": 0, "7678": 1, "3979": 2, "3619": 3, "4713": 4 };

const flagColors = {
  ke: ["#BB0000", "#006600", "#D9D9D9"],
  tz: ["#1EB53A", "#00A3DD", "#FCD116"],
  ug: ["#FCDC04", "#D90000", "#D9D9D9"],
  cu: ["#D9D9D9"]
};

function setAccentColor() {
  const colors = flagColors[currentCountry] || ["#D9D9D9"];
  const lightColors = colors.filter(c => {
    const hex = c.replace('#', '');
    const r = parseInt(hex.slice(0,2), 16);
    const g = parseInt(hex.slice(2,4), 16);
    const b = parseInt(hex.slice(4,6), 16);
    const brightness = (r * 299 + g * 587 + b * 114) / 1000;
    return brightness > 50;
  });
  const pool = lightColors.length > 0 ? lightColors : colors;
  const accent = pool[Math.floor(Math.random() * pool.length)];
  document.documentElement.style.setProperty('--accent', accent);
}

async function loadSVG(variant) {
  const portrait = document.getElementById('portrait');
  const variantIndex = variants[variant];
  if (variantIndex === undefined) return;
  
  const url = "https://" + arweaveUrls[variantIndex];
  if (!url) return;

  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const svgText = await response.text();
    portrait.innerHTML = svgText;
  } catch (err) {
    console.error("SVG load error:", err);
    portrait.innerHTML = '<div id="portrait-loading">LOAD ERROR</div>';
  }
}

function applyColors() {
  const svg = document.querySelector('#portrait svg');
  if (!svg) return;
  
  Object.entries(colors).forEach(([key, value]) => {
    const el = svg.querySelector(`#${key}`);
    if (el) el.style.fill = value;
  });
}

function selectRow(txId) {
  document.querySelectorAll('.gallery-item').forEach(row => {
    row.style.borderLeft = 'none';
    row.style.paddingLeft = '0';
  });
  
  const selectedRow = document.querySelector(`.gallery-item[data-tx-id="${txId}"]`);
  if (selectedRow) {
    selectedRow.style.borderLeft = '2px solid var(--accent)';
    selectedRow.style.paddingLeft = '4px';
  }
}

async function loadSharedResonance(txId) {
  selectRow(txId);

  try {
    const response = await fetch(`https://arweave.net/${txId}`);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const data = await response.json();
    currentVariant = data.variant || "7678";
    currentCountry = data.country || "ke";
    colors = data.palette || {};

    setAccentColor();
    await loadSVG(currentVariant);
    applyColors();
  } catch (err) {
    console.error("[Gallery] Error:", err);
    alert("Could not load shared resonance: " + err.message);
  }
}

async function fetchGalleryResonances(loadMore = false) {
  const container = document.getElementById('trait-list');

  if (!loadMore) {
    galleryCursor = null;
    galleryHasMore = false;
    container.innerHTML = '<div class="label" style="opacity: 0.5">LOADING...</div>';

    try {
      const response = await fetch('https://arweave.net/graphql', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          query: `
            query {
              transactions(
                first: 20,
                tags: [{ name: "App-Name", values: ["Quiet-Phone-Resonance"] }]
              ) {
                edges {
                  node {
                    id
                    owner { address }
                    tags { name value }
                  }
                  cursor
                }
                pageInfo { hasNextPage }
              }
            }
          `
        })
      });

      const result = await response.json();

      if (result.errors) {
        console.error("GraphQL Errors:", result.errors);
        throw new Error(result.errors[0].message || "GraphQL error");
      }

      if (!result.data?.transactions) {
        container.innerHTML = '<div class="label" style="opacity: 0.5">GALLERY UNAVAILABLE</div>';
        return;
      }

      const edges = result.data.transactions.edges;
      const pageInfo = result.data.transactions.pageInfo;

      galleryHasMore = pageInfo.hasNextPage;
      galleryCursor = edges.length > 0 ? edges[edges.length - 1].cursor : null;

      container.innerHTML = '';

      if (edges.length === 0) {
        container.innerHTML = '<div class="label" style="opacity: 0.5">No resonances yet</div>';
        return;
      }

      let displayNumber = 1;
      edges.forEach((edge) => {
        const txId = edge.node.id;
        const address = edge.node.owner.address;
        const shortAddr = `${address.slice(0, 6)}...${address.slice(-4)}`;
        const tags = edge.node.tags.reduce((acc, t) => { acc[t.name] = t.value; return acc; }, {});
        const country = tags.Country || '??';
        const variant = tags['Phone-Variant'] || '????';

        const row = document.createElement('div');
        row.className = 'row gallery-item';
        row.dataset.txId = txId;
        row.style.cursor = 'pointer';
        row.style.padding = '8px 0';
        row.style.borderBottom = '1px solid color-mix(in srgb, var(--accent) 5%, transparent)';
        row.style.transition = 'border-left 0.2s ease';
        row.style.animationDelay = `${(displayNumber - 1) * 25}ms`;

        row.innerHTML = `
          <div class="label" style="opacity: 0.3">${displayNumber}.</div>
          <div class="label" style="opacity: 0.8">${shortAddr}</div>
          <div class="label" style="font-size: 9px; opacity: 0.5">${country.toUpperCase()}</div>
          <div class="label" style="font-size: 9px; opacity: 0.5">${variant}</div>
          <div class="label" style="font-size: 9px; opacity: 0.3">${txId.slice(0, 8)}</div>
        `;

        row.onclick = () => loadSharedResonance(txId);
        container.appendChild(row);
        displayNumber++;
      });

      await loadSharedResonance(edges[0].node.id);

    } catch (err) {
      console.error("Gallery Fetch Failed:", err);
      container.innerHTML = '<div class="label" style="color:#f66">FETCH FAILED</div>';
    }
  } else {
    if (!galleryCursor) return;

    try {
      const response = await fetch('https://arweave.net/graphql', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          query: `
            query($cursor: String) {
              transactions(
                first: 20,
                after: $cursor,
                tags: [{ name: "App-Name", values: ["Quiet-Phone-Resonance"] }]
              ) {
                edges {
                  node {
                    id
                    owner { address }
                    tags { name value }
                  }
                  cursor
                }
                pageInfo { hasNextPage }
              }
            }
          `,
          variables: { cursor: galleryCursor }
        })
      });

      const result = await response.json();
      if (result.errors) throw new Error(result.errors[0].message || "GraphQL error");
      if (!result.data?.transactions) return;

      const edges = result.data.transactions.edges;
      const pageInfo = result.data.transactions.pageInfo;

      galleryHasMore = pageInfo.hasNextPage;
      galleryCursor = edges.length > 0 ? edges[edges.length - 1].cursor : null;

      let displayNumber = container.querySelectorAll('.gallery-item').length + 1;
      const loadMoreBtn = document.getElementById('load-more-btn');
      const insertBefore = loadMoreBtn || null;

      edges.forEach((edge) => {
        const txId = edge.node.id;
        const address = edge.node.owner.address;
        const shortAddr = `${address.slice(0, 6)}...${address.slice(-4)}`;
        const tags = edge.node.tags.reduce((acc, t) => { acc[t.name] = t.value; return acc; }, {});
        const country = tags.Country || '??';
        const variant = tags['Phone-Variant'] || '????';

        const row = document.createElement('div');
        row.className = 'row gallery-item';
        row.dataset.txId = txId;
        row.style.cursor = 'pointer';
        row.style.padding = '8px 0';
        row.style.borderBottom = '1px solid color-mix(in srgb, var(--accent) 5%, transparent)';
        row.style.transition = 'border-left 0.2s ease';

        row.innerHTML = `
          <div class="label" style="opacity: 0.3">${displayNumber}.</div>
          <div class="label" style="opacity: 0.8">${shortAddr}</div>
          <div class="label" style="font-size: 9px; opacity: 0.5">${country.toUpperCase()}</div>
          <div class="label" style="font-size: 9px; opacity: 0.5">${variant}</div>
          <div class="label" style="font-size: 9px; opacity: 0.3">${txId.slice(0, 8)}</div>
        `;

        row.onclick = () => loadSharedResonance(txId);
        if (insertBefore) {
          container.insertBefore(row, insertBefore);
        } else {
          container.appendChild(row);
        }
        displayNumber++;
      });

    } catch (err) {
      console.error("Load More Failed:", err);
    }
  }

  if (galleryHasMore) {
    if (!document.getElementById('load-more-btn')) {
      const btn = document.createElement('button');
      btn.id = 'load-more-btn';
      btn.textContent = 'LOAD MORE';
      btn.style.cssText = 'background:none;border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);color:var(--accent);padding:8px 16px;cursor:pointer;font-family:inherit;font-size:10px;letter-spacing:2px;margin-top:8px;width:100%;transition:all 0.2s ease;';
      btn.onmouseover = () => { btn.style.background = 'var(--accent)'; btn.style.color = '#0e0e0e'; };
      btn.onmouseout = () => { btn.style.background = 'none'; btn.style.color = 'var(--accent)'; };
      btn.onclick = () => fetchGalleryResonances(true);
      container.appendChild(btn);
    }
  } else {
    const btn = document.getElementById('load-more-btn');
    if (btn) btn.remove();
  }

  // URL ?tx= support
  const urlParams = new URLSearchParams(window.location.search);
  const txId = urlParams.get('tx');
  if (txId && /^[a-zA-Z0-9_-]{43}$/.test(txId)) {
    loadSharedResonance(txId);
  }
}

fetchGalleryResonances();
</script>

</body>
</html>
